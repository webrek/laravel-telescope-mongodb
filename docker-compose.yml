services:
  mongo:
    image: mongo:7
    container_name: telescope-mongodb-test
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 12

  mysql:
    image: mysql:8
    container_name: telescope-mongodb-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: telescope_bench
      MYSQL_USER: telescope
      MYSQL_PASSWORD: secret
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 24
    profiles: ["bench"]

  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: telescope-mongodb-php
    container_name: telescope-mongodb-php
    working_dir: /package
    volumes:
      - .:/package
      - composer-cache:/root/.composer/cache
    environment:
      TELESCOPE_MONGODB_TEST_DSN: mongodb://mongo:27017
      TELESCOPE_MONGODB_TEST_DATABASE: telescope_mongodb_ci
    depends_on:
      mongo:
        condition: service_healthy
    tty: true
    stdin_open: true
    command: ["tail", "-f", "/dev/null"]

  laravel:
    image: telescope-mongodb-php
    container_name: telescope-mongodb-playground
    working_dir: /package/playground
    volumes:
      - .:/package
      - composer-cache:/root/.composer/cache
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]

  laravel-mysql:
    image: telescope-mongodb-php
    container_name: telescope-mongodb-playground-mysql
    working_dir: /package/playground-mysql
    volumes:
      - .:/package
      - composer-cache:/root/.composer/cache
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8001"]
    profiles: ["bench"]

volumes:
  composer-cache:
