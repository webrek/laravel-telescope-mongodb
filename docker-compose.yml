services:
  mongo:
    image: mongo:7
    container_name: telescope-mongodb-test
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 12

  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: telescope-mongodb-php
    container_name: telescope-mongodb-php
    working_dir: /package
    volumes:
      - .:/package
      - composer-cache:/root/.composer/cache
    environment:
      TELESCOPE_MONGODB_TEST_DSN: mongodb://mongo:27017
      TELESCOPE_MONGODB_TEST_DATABASE: telescope_mongodb_ci
    depends_on:
      mongo:
        condition: service_healthy
    tty: true
    stdin_open: true
    command: ["tail", "-f", "/dev/null"]

  laravel:
    image: telescope-mongodb-php
    container_name: telescope-mongodb-playground
    working_dir: /package/playground
    volumes:
      - .:/package
      - composer-cache:/root/.composer/cache
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]

volumes:
  composer-cache:
